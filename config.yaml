# ==========================================================
# F1 LED SCOREBOARD CONFIGURATION - 2026 SEASON
# ==========================================================

# Sequence of F1 scenes to display.
# Available scenes:
#   f1_next_race           - Upcoming race weekend info (date, circuit, round)
#   f1_race_weekend        - Qualifying grid or race results (weekend-aware)
#   f1_driver_standings    - WDC standings, scrolling
#   f1_constructor_standings - WCC standings, scrolling
#   f1_race_preview        - Starting-lights animation with race card
scene_order:
  - f1_next_race
  - f1_driver_standings
  - f1_constructor_standings
  - f1_race_weekend
  - f1_race_preview

# Personalization
favourite_drivers:
  - HAM   # Lewis Hamilton (Ferrari)
  - NOR   # Lando Norris (McLaren)

# Scene-level settings
scene_settings:
  f1:
    # --- Next Race scene ---
    next_race:
      transition: 'modern'
      splash:
        display_splash: True
        splash_display_duration: 2
      display_duration: 6          # seconds per page (circuit / schedule)

    # --- Race Weekend scene (quali grid + race results) ---
    race_weekend:
      transition: 'modern'
      splash:
        display_splash: True
        splash_display_duration: 2
      driver_display_duration: 3   # seconds each driver row is highlighted

    # --- Driver Standings scene ---
    driver_standings:
      transition: 'modern'
      splash:
        display_splash: True
        splash_display_duration: 2
      highlight_fav_drivers: True
      scroll:
        scroll_frame_duration: 0.075
        scroll_pause_duration: 1.0

    # --- Constructor Standings scene ---
    constructor_standings:
      transition: 'modern'
      splash:
        display_splash: True
        splash_display_duration: 2
      scroll:
        scroll_frame_duration: 0.075
        scroll_pause_duration: 1.0

    # --- Race Preview (starting lights) scene ---
    race_preview:
      transition: 'modern'
      display_duration: 5          # race card display before lights sequence
      show_starting_lights: True

# Brightness settings
brightness:
  brightness_mode: 'static'
  max_brightness: 60

# Hardware configuration
hardware_config:
  hardware_mapping: 'adafruit-hat-pwm'
  gpio_slowdown: 4   # High slowdown for Pi Zero stability
