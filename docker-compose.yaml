---
services:
  scoreboard:
    image: ghcr.io/gidger/rpi-led-sports-scoreboard:latest
    container_name: rpi-led-sports-scoreboard
    privileged: true
    restart: unless-stopped
    volumes:
      # Binding config.yaml to allow the container to access the config file.
      - type: bind
        source: ./config.yaml
        target: /app/config.yaml
        read_only: true
      # Binding assets directory so any added custom alt logos can be used.
      - type: bind
        source: ./assets
        target: /app/assets
        read_only: false
      # Binding localtime to sync RPi and container timezones.
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
      #Binding for use with existing image
      - type: bind
        source: ./data
        target: /app/data
        read_only: true
      #Binding for use with existing image
      - type: bind
        source: ./main.py
        target: /app/main.py
        read_only: true
      #Binding for use with existing image
      - type: bind
        source: ./scenes
        target: /app/scenes
        read_only: true
      #Binding for use with existing image
      - type: bind
        source: ./utils
        target: /app/utils
        read_only: true

  config-ui:
    image: python:3.12-slim-bookworm # Or Trixie
    restart: unless-stopped
    volumes:
      - type: bind
        source: ./config.yaml
        target: /app/config.yaml
        read_only: false
      - type: bind
        source: ./assets
        target: /app/static
        read_only: false
      - type: bind
        source: ./web_app.py
        target: /app/web_app.py
        read_only: true
      - type: bind
        source: ./templates
        target: /app/templates
        read_only: true  
    ports:
      - "80:5000"
    working_dir: /app
    command: >
      sh -c "pip install flask ruamel.yaml && python web_app.py"
